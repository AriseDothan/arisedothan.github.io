<div class="special-note reveal">
  <div class="special-note__icon" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l18-5v12L3 14v-3z"/><path d="M11.6 16.5 13 21h-2l-2-4.5"/></svg>
  </div>
  <div class="special-note__body">
    <span class="special-note__tag">{{announcement.tag}}</span>
    <p>{{announcement.note}}</p>
  </div>
  <div class="special-note__actions">
    <a class="btn btn--gold" href="{{announcement.map_url}}" target="_blank" rel="noopener">Get directions</a>
  </div>
</div>

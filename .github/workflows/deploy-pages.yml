name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # 13:05 UTC ≈ 8:05 AM Central — daily rebuild so scheduled blog posts
    # (content/blog/*.md with a future published_at) go live automatically
    # on their date without a manual push. See build.js's BUILD_DATE-aware
    # future-post filtering.
    - cron: '5 13 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build arise-dothan
        run: node build.js arise-dothan

      - name: Add custom domain CNAME
        run: echo "arisedothan.com" > dist/arise-dothan/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/arise-dothan

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
